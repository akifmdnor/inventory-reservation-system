services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - inventory_redis_data:/data
    networks:
      - irs
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      # Inside the container, Redis is the compose service — not localhost.
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: "3002"
    networks:
      - irs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

networks:
  irs:
    name: inventory-irs-local

volumes:
  inventory_redis_data:
